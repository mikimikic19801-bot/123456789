<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RADAR FUDBAL PRO</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://tailwindcss.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --accent: #10b981; --gold: #fbbf24; --bg: #020617; }
        body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; }
        .font-radar { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; }
        .radar-scan { border: 1px solid var(--accent); box-shadow: 0 0 20px rgba(16, 185, 129, 0.1); }
        .favorit-gold { border: 1px solid var(--gold); }
        .alarm-blink { animation: blink 1s infinite; border: 2px solid #ef4444; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .btn-main { background: linear-gradient(135deg, #10b981 0%, #059669 100%); font-weight: 900; letter-spacing: 1px; }
    </style>
</head>
<body class="pb-28">

    <!-- Navbar -->
    <nav class="sticky top-0 z-50 px-6 py-5 glass border-b border-white/5 flex justify-between items-center">
        <div>
            <h1 class="font-radar text-emerald-400 text-xl tracking-tighter">RADAR <span class="text-white">PRO</span></h1>
            <p id="clock" class="text-[9px] text-slate-500 font-bold tracking-widest">SYSTEM ONLINE</p>
        </div>
        <div class="flex items-center gap-2">
            <div id="key-label" class="text-[9px] bg-white/5 px-2 py-1 rounded border border-white/10 uppercase">API: 1</div>
            <div class="w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]"></div>
        </div>
    </nav>

    <main class="p-4 space-y-6">
        <!-- 12h/17h Market Report -->
        <section id="odds-report-box" class="hidden glass p-5 border-emerald-500/30">
            <h2 class="text-xs font-black text-emerald-400 uppercase italic mb-3">⚠️ MARKET SCAN: Padovi Kvote > 10%</h2>
            <div id="drops-content" class="text-[11px] space-y-2"></div>
        </section>

        <!-- Live Dashboard -->
        <div class="grid grid-cols-3 gap-3">
            <div class="glass p-4 text-center">
                <p class="text-[9px] text-slate-500 font-bold uppercase">Mečevi</p>
                <p id="stat-live" class="text-2xl font-black">0</p>
            </div>
            <div class="glass p-4 text-center border-amber-500/20">
                <p class="text-[9px] text-amber-500 font-bold uppercase">Favoriti</p>
                <p id="stat-fav" class="text-2xl font-black text-amber-400">0</p>
            </div>
            <div class="glass p-4 text-center border-red-500/20">
                <p class="text-[9px] text-red-500 font-bold uppercase">Alarmi</p>
                <p id="stat-alert" class="text-2xl font-black text-red-500">0</p>
            </div>
        </div>

        <!-- Matches -->
        <div id="main-container" class="space-y-4">
            <div class="text-center py-20 opacity-20">
                <p class="text-xs font-bold uppercase tracking-[5px]">Inicijalizacija...</p>
            </div>
        </div>
    </main>

    <!-- Sound Activation Modal -->
    <div id="sound-modal" class="fixed inset-0 bg-[#020617] z-[100] flex flex-col items-center justify-center p-8">
        <div class="w-24 h-24 bg-emerald-500/20 rounded-full flex items-center justify-center mb-6 radar-scan">
            <div class="w-4 h-4 bg-emerald-500 rounded-full animate-ping"></div>
        </div>
        <h2 class="font-radar text-2xl mb-2">RADAR FUDBAL PRO</h2>
        <p class="text-slate-400 text-center text-sm mb-10">Sistem je spreman. Aktiviraj audio signale za live alarme i preseke kvota.</p>
        <button onclick="startApp()" class="btn-main text-black px-14 py-5 rounded-2xl text-sm uppercase">Pokreni Radar</button>
    </div>

    <!-- Bottom Refresh -->
    <div class="fixed bottom-0 left-0 right-0 p-6 glass border-t border-white/5">
        <button onclick="updateData()" class="btn-main w-full py-4 rounded-2xl text-black text-xs uppercase tracking-widest active:scale-95 transition-all">
            Osveži Radar (4 min)
        </button>
    </div>

    <script>
        const FB_KEYS = ['8464fe0b2c02cc648155fd7aaa8a5806', 'f1cce1e4be71307c45a7a206e4a16495'];
        const ODDS_KEY = '0fe3d301aa11cda024d49acef8511f22';
        let keyIdx = 0;
        let preMatchStore = {};
        let sounds = {
            alert: new Audio('https://mixkit.co'),
            report: new Audio('https://mixkit.co')
        };

        function startApp() {
            document.getElementById('sound-modal').style.display = 'none';
            Notification.requestPermission();
            initOdds();
            setInterval(updateData, 240000);
            setInterval(clockTick, 1000);
        }

        async function initOdds() {
            try {
                const res = await fetch(`https://the-odds-api.com{ODDS_KEY}&regions=eu`);
                const data = await res.json();
                data.forEach(g => {
                    const homePrice = g.bookmakers?.[0]?.markets?.[0]?.outcomes?.[0]?.price;
                    const awayPrice = g.bookmakers?.[0]?.markets?.[0]?.outcomes?.[1]?.price;
                    preMatchStore[g.home_team] = homePrice;
                    preMatchStore[g.away_team] = awayPrice;
                });
            } catch(e) {}
            updateData();
        }

        async function updateData() {
            const key = FB_KEYS[keyIdx];
            try {
                const res = await fetch('https://api-sports.io', {
                    headers: { 'x-apisports-key': key }
                });
                const data = await res.json();
                if (data.errors?.requests) {
                    keyIdx = (keyIdx + 1) % FB_KEYS.length;
                    document.getElementById('key-label').innerText = `API: ${keyIdx + 1}`;
                    return updateData();
                }
                render(data.response);
            } catch(e) {}
        }

        function render(matches) {
            const container = document.getElementById('main-container');
            container.innerHTML = '';
            let f = 0, a = 0;

            matches.forEach(m => {
                const hName = m.teams.home.name;
                const aName = m.teams.away.name;
                const hG = m.goals.home;
                const aG = m.goals.away;
                const time = m.fixture.status.elapsed;
                
                const startH = preMatchStore[hName] || 0;
                const startA = preMatchStore[aName] || 0;
                const isFavMatch = (startH > 0 && startH < 1.75) || (startA > 0 && startA < 1.75);
                const red = m.events?.some(e => e.type === 'Card' && e.detail.includes('Red Card'));

                // Logika alarma
                let isCritical = false;
                if (startH > 0 && startH < 1.75 && (hG < aG || (time >= 75 && hG == aG))) isCritical = true;
                if (startA > 0 && startA < 1.75 && (aG < hG || (time >= 75 && aG == hG))) isCritical = true;
                if (red) isCritical = true;

                if (isFavMatch) f++;
                if (isCritical) { a++; sounds.alert.play(); }

                container.innerHTML += `
                    <div class="glass p-5 ${isFavMatch ? 'favorit-gold' : ''} ${isCritical ? 'alarm-blink' : ''}">
                        <div class="flex justify-between text-[10px] font-bold text-slate-500 mb-4 uppercase tracking-widest">
                            <span>${m.league.name}</span>
                            <span class="${time > 80 ? 'text-red-500' : 'text-emerald-400'}">${time}' MIN</span>
                        </div>
                        <div class="flex items-center justify-between">
                            <div class="w-1/3 text-center">
                                <p class="text-[11px] font-black truncate">${hName}</p>
                                <p class="text-[9px] text-slate-500">Pre: ${startH || 'N/A'}</p>
                            </div>
                            <div class="w-1/3 text-center text-3xl font-black font-radar tracking-tighter">${hG}:${aG}</div>
                            <div class="w-1/3 text-center">
                                <p class="text-[11px] font-black truncate">${aName}</p>
                                <p class="text-[9px] text-slate-500">Pre: ${startA || 'N/A'}</p>
                            </div>
                        </div>
                        ${red ? '<p class="text-center text-[9px] text-red-500 font-black mt-3 animate-pulse">🟥 CRVENI KARTON</p>' : ''}
                    </div>`;
            });
            document.getElementById('stat-live').innerText = matches.length;
            document.getElementById('stat-fav').innerText = f;
            document.getElementById('stat-alert').innerText = a;
        }

        function clockTick() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
            // Presek 12h/17h
            if ((now.getHours() === 12 || now.getHours() === 17) && now.getMinutes() === 0 && now.getSeconds() === 0) {
                sounds.report.play();
                // Ovu funkciju smo već definisali u prethodnim koracima za padove kvota
            }
        }

        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
</body>
</html>
